services:
  neo4j:
    image: neo4j:5.26.0
    container_name: ${PROJECT_NAME:-workspace}-neo4j
    profiles:
      - "default"
    ports:
      - "${HOST_BIND:-127.0.0.1}:${NEO4J_HTTP_PORT:-7474}:7474"
      - "${HOST_BIND:-127.0.0.1}:${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_server_memory_heap_initial__size=${NEO4J_HEAP_INITIAL:-512m}
      - NEO4J_server_memory_heap_max__size=${NEO4J_HEAP_MAX:-1G}
      - NEO4J_server_memory_pagecache_size=${NEO4J_PAGECACHE:-512m}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - workspace-network

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  workspace-network:
    name: ${PROJECT_NAME:-workspace}-network
    external: true
